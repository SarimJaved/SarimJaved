name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *"  # This runs every 6 hours
  workflow_dispatch:  # This allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest  # Runs on the latest Ubuntu environment

    steps:
    # Checkout the repository
    - uses: actions/checkout@v2

    # Ensure the dist/ directory exists
    - name: Create output directory
      run: mkdir -p dist

    # Generate the snake GIF and SVG
    - uses: Platane/snk@master
      id: snake-gif
      with:
        github_user_name: SarimJaved  
        gif_out_path: dist/github-contribution-grid-snake.gif  # Path for the GIF file
        svg_out_path: dist/github-contribution-grid-snake.svg  # Path for the SVG file

    # Show the status of the repository for debugging
    - run: git status

    # Push changes back to the repository
    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}  # GitHub token for authentication
        branch: master  # Branch to push the changes to
        force: true  # Force push to avoid any conflicts

    # Deploy to GitHub Pages (on the output branch)
    - uses: crazy-max/ghaction-github-pages@v2.1.3
      with:
        target_branch: output  # The branch for GitHub Pages deployment
        build_dir: dist  # The directory containing the generated files
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # GitHub token for authentication
